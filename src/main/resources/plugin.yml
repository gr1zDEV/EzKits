name: EzKits
version: 1.0.0
main: com.ezinnovations.ezkits.EzKitsPlugin
api-version: '1.20'
authors: [EzInnovations]
description: Modern GUI-first kits plugin.
folia-supported: true
softdepend: [Nexo, ExecutableItems]
commands:
  kits:
    description: Opens the kits GUI.
    usage: /kits
    permission: ezkits.use
  kit:
    description: Claim or preview a kit.
    usage: /kit <name> OR /kit preview <name>
    permission: ezkits.use
  ezkits:
    description: EzKits admin command.
    usage: /ezkits <reload|give|open>
    permission: ezkits.admin
permissions:
  ezkits.use:
    default: true
  ezkits.preview:
    default: true
  ezkits.kit.*:
    default: op
    children:
      ezkits.kit.starter: true
  ezkits.admin:
    default: op
    children:
      ezkits.reload: true
      ezkits.give: true
      ezkits.open: true
  ezkits.reload:
    default: op
  ezkits.give:
    default: op
  ezkits.open:
    default: op
